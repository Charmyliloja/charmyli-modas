<body><h1>Charmyli Modas - Painel de Pedidos</h1>

<p>Busca Pedido: <input id='q'><button onclick='buscar()'>Buscar</button></p>
<div id='out'></div></div>
<script>
let pedidos=[]
function buscar(){let q=document.getElementById('q').value;document.getElementById('out').innerText='Pedido '+q+' (cadastre/importe dados na versão completa).'}
</script></body></html>
